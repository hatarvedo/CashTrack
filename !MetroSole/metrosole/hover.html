<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://scripts.sirv.com/sirvjs/v3/sirv.js"></script>
    <style>
        /*  Rollover image styles  */
        body{
            background-color: black;
        }
        
        .figure {
          position: relative;
          width: 360px; /* can be omitted for a regular non-lazy image */
          max-width: 100%;
        }
        .figure img.Sirv.image-hover {
          position: absolute;
          top: 0;
          right: 0;
          left: 0;
          bottom: 0;
          object-fit: contain;
          opacity: 0;
          transition: opacity .2s;
        }
        .figure:hover img.Sirv.image-hover {
          opacity: 1;
        }
      </style>
</head>
<body>
    <div class="figure">
        <img class="Sirv image-main" src="https://demo.sirv.com/hc/Bose-700-a.jpg?w=10&colorize.color=efefef" data-src="media/af1-1.png">
        <img class="Sirv image-hover" data-src="media/af1-2.png">
      </div>
</body>
</html>
